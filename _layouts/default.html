<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:image" content="{{ '/banner.png' | relative_url }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta name="theme-color" content="#090d14">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">
</head>
<body class="docs-page">
  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}">PA_PVP</a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}#problem">Problem</a>
        <a href="{{ '/' | relative_url }}#kernel">Kernel</a>
        <a href="{{ '/guide.html' | relative_url }}">Guide</a>
        <a href="{{ '/glossary.html' | relative_url }}">Glossary</a>
        <a href="{{ '/examples.html' | relative_url }}">Examples</a>
      </nav>
    </header>

    <main class="doc-main">
      <section class="doc-hero">
        <p class="eyebrow">Reference</p>
        <h1>{{ page.title | default: site.title }}</h1>
        {% if page.description %}
        <p class="lead">{{ page.description }}</p>
        {% endif %}
      </section>

      <article class="doc-prose">
        {{ content }}
      </article>
    </main>

    <footer class="site-footer">
      <p>PA_PVP - a PLUTONIUM-like Adversarial Peer Validation Protocol | GitHub Pages surface for the public repo | CC BY-SA 4.0</p>
    </footer>
  </div>

  <script src="{{ '/script.js' | relative_url }}"></script>
</body>
</html>
